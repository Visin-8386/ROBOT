version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: robot_postgres
    restart: always
    environment:
      POSTGRES_USER: robot
      POSTGRES_PASSWORD: robot123
      POSTGRES_DB: robot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mosquitto:
    image: eclipse-mosquitto:2.0.15
    container_name: robot_mosquitto
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

volumes:
  postgres_data:
  mosquitto_data:
  mosquitto_log:
